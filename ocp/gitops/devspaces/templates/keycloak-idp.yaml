{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- $clusterDomain := $ingressConfig.spec.domain }}
{{- $kcSecret := lookup "v1" "Secret" "keycloak" "keycloak-ocp-client-secret" }}
{{- $clientSecret := "WAITING_FOR_KEYCLOAK_SECRET" }}
{{- if and $kcSecret $kcSecret.data (index $kcSecret.data "client-secret") }}
{{- $clientSecret = index $kcSecret.data "client-secret" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-oidc-secret
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  clientSecret: {{ $clientSecret }}
---
{{- if .Values.gitlab.login }}
{{- $glSecret := lookup "v1" "Secret" "gitlab-system" "gitlab-openshift-oauth" }}
{{- if and $glSecret $glSecret.data }}
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-oidc-secret
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
data:
  clientSecret: {{ index $glSecret.data "secret" }}
---
{{- end }}
{{- end }}
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  identityProviders:
    - name: Local
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: htpasswd-secret
    - name: rhbk
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: idp-4-ocp
        clientSecret:
          name: keycloak-oidc-secret
        issuer: https://sso.{{ $clusterDomain }}/realms/sso
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
{{- if .Values.gitlab.login }}
{{- $glSecret := lookup "v1" "Secret" "gitlab-system" "gitlab-openshift-oauth" }}
{{- if and $glSecret $glSecret.data }}
{{- $gitlabHost := .Values.gitlab.host }}
{{- if not $gitlabHost }}
{{- $dns := lookup "config.openshift.io/v1" "DNS" "" "cluster" }}
{{- if $dns }}
{{- $gitlabHost = printf "gitlab.apps.%s" $dns.spec.baseDomain }}
{{- end }}
{{- end }}
    - name: gitlab
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: {{ index $glSecret.data "id" | b64dec }}
        clientSecret:
          name: gitlab-oidc-secret
        issuer: https://{{ $gitlabHost }}
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
{{- end }}
{{- end }}
