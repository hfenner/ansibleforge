apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: user-devspaces
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          {{- range .Values.users }}
          - username: {{ . }}
          {{- end }}
  template:
    metadata:
      name: '{{`{{ .username }}`}}-devspace'
    spec:
      project: '{{`{{ .username }}`}}'
      source:
        repoURL: {{ .Values.repoURL }}
        targetRevision: {{ .Values.targetRevision }}
        path: ocp/gitops/user-devspace
        helm:
          parameters:
            - name: username
              value: '{{`{{ .username }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ .username }}`}}-devspaces'
      ignoreDifferences:
        - group: workspace.devfile.io
          kind: DevWorkspace
          jsonPointers:
            - /spec/started
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /spec/data/0/remoteRef/conversionStrategy
            - /spec/data/0/remoteRef/decodingStrategy
            - /spec/data/0/remoteRef/metadataPolicy
            - /spec/data/1/remoteRef/conversionStrategy
            - /spec/data/1/remoteRef/decodingStrategy
            - /spec/data/1/remoteRef/metadataPolicy
            - /spec/target/creationPolicy
            - /spec/target/deletionPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - RespectIgnoreDifferences=true
