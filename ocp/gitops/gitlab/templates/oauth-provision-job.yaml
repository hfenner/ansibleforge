apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-oauth-provisioner
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-oauth-provisioner
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-oauth-provisioner
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: gitlab-oauth-provisioner
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: gitlab-oauth-provisioner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-oauth-provision-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: gitlab-oauth-provisioner
      restartPolicy: OnFailure
      containers:
        - name: provision
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITLAB_URL
              value: "https://gitlab.{{ .Values.domain }}"
            - name: NAMESPACE
              value: {{ .Values.namespace }}
            - name: DEVSPACES_REDIRECT
              value: "https://devspaces.{{ .Values.domain }}/api/oauth/callback"
            - name: KEYCLOAK_REDIRECT
              value: "https://keycloak.{{ .Values.domain }}/realms/sso/broker/gitlab/endpoint"
            - name: OCP_OAUTH_REDIRECT
              value: "https://oauth-openshift.{{ .Values.domain }}/oauth2callback/gitlab"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # Wait for GitLab to be accessible
              echo "Waiting for GitLab at $GITLAB_URL..."
              for i in $(seq 1 60); do
                if curl -skf "$GITLAB_URL/-/readiness" > /dev/null 2>&1; then
                  echo "GitLab is ready"
                  break
                fi
                echo "  Attempt $i/60..."
                sleep 15
              done

              # Get root password
              ROOT_PASSWORD=$(oc get secret gitlab-gitlab-initial-root-password \
                -n "$NAMESPACE" -o jsonpath='{.data.password}' | base64 -d)

              # Get OAuth token via password grant
              echo "Authenticating to GitLab API..."
              TOKEN=$(curl -sk "$GITLAB_URL/oauth/token" \
                -d "grant_type=password&username=root&password=$ROOT_PASSWORD" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

              create_or_update_app() {
                local APP_NAME="$1"
                local REDIRECT_URI="$2"
                local SCOPES="$3"
                local SECRET_NAME="$4"

                echo "Checking for existing OAuth app: $APP_NAME"
                EXISTING=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                  "$GITLAB_URL/api/v4/applications" \
                  | python3 -c "
              import json,sys
              apps = json.load(sys.stdin)
              match = [a for a in apps if a['application_name'] == '$APP_NAME']
              print(match[0]['id'] if match else '')
              " 2>/dev/null || echo "")

                if [ -n "$EXISTING" ]; then
                  echo "Deleting existing app $APP_NAME (id=$EXISTING) to recreate..."
                  curl -sk -X DELETE -H "Authorization: Bearer $TOKEN" \
                    "$GITLAB_URL/api/v4/applications/$EXISTING"
                fi

                echo "Creating OAuth app: $APP_NAME"
                RESULT=$(curl -sk -X POST -H "Authorization: Bearer $TOKEN" \
                  "$GITLAB_URL/api/v4/applications" \
                  -d "name=$APP_NAME" \
                  -d "redirect_uri=$REDIRECT_URI" \
                  -d "scopes=$SCOPES" \
                  -d "confidential=true")

                APP_ID=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin)['application_id'])")
                APP_SECRET=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin)['secret'])")

                echo "Storing credentials in secret: $SECRET_NAME"
                oc apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: $SECRET_NAME
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                id: "$APP_ID"
                secret: "$APP_SECRET"
              EOF

                echo "Done: $APP_NAME -> $SECRET_NAME"
              }

              # Dev Spaces SCM OAuth app
              create_or_update_app \
                "devspaces" \
                "$DEVSPACES_REDIRECT" \
                "api read_user write_repository" \
                "gitlab-devspaces-oauth"

              # Keycloak identity broker OAuth app
              create_or_update_app \
                "keycloak-broker" \
                "$KEYCLOAK_REDIRECT" \
                "read_user openid profile email" \
                "gitlab-keycloak-broker-oauth"

              # Direct OpenShift OAuth login via GitLab
              create_or_update_app \
                "openshift-oauth" \
                "$OCP_OAUTH_REDIRECT" \
                "read_user openid profile email" \
                "gitlab-openshift-oauth"

              echo "=== All OAuth apps provisioned ==="
