{{- $clusterDomain := "" }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- if $clusterDomain }}
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: aws-console
spec:
  location: ApplicationMenu
  text: AWS Console (SSO)
  href: https://keycloak.{{ $clusterDomain }}/realms/sso/protocol/saml/clients/urn%3Aamazon%3Awebservices
  applicationMenu:
    section: Cloud Provider
    imageURL: https://a0.awsstatic.com/libra-css/images/logos/aws_smile-header-desktop-en-white_59x35@2x.png
---
{{- end }}
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: ansibleforge-repo
spec:
  location: ApplicationMenu
  text: AnsibleForge (GitHub)
  href: https://github.com/hfenner/ansibleforge
  applicationMenu:
    section: AnsibleForge
    imageURL: https://github.githubassets.com/favicons/favicon.svg
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: ansibleforge-docs
spec:
  location: ApplicationMenu
  text: AnsibleForge Docs
  href: https://hfenner.github.io/ansibleforge/
  applicationMenu:
    section: AnsibleForge
    imageURL: https://github.githubassets.com/favicons/favicon.svg
