{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: sso-realm
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  keycloakCRName: keycloak
  placeholders:
    OCP_CLIENT_SECRET:
      secret:
        name: keycloak-ocp-client-secret
        key: client-secret
    SYSADMIN_PASSWORD:
      secret:
        name: keycloak-sysadmin-password
        key: password
    GITLAB_CLIENT_SECRET:
      secret:
        name: keycloak-gitlab-client-secret
        key: client-secret
    {{- if .Values.gitlab.broker }}
    GITLAB_BROKER_CLIENT_ID:
      secret:
        name: gitlab-broker-credentials
        key: clientId
    GITLAB_BROKER_CLIENT_SECRET:
      secret:
        name: gitlab-broker-credentials
        key: clientSecret
    {{- end }}
    {{- if .Values.github.broker }}
    GITHUB_CLIENT_ID:
      secret:
        name: github-app-credentials
        key: client-id
    GITHUB_CLIENT_SECRET:
      secret:
        name: github-app-credentials
        key: client-secret
    {{- end }}
  realm:
    realm: sso
    enabled: true
    users:
      - username: sysadmin
        enabled: true
        firstName: System
        lastName: Administrator
        email: sysadmin@example.com
        credentials:
          - type: password
            value: ${SYSADMIN_PASSWORD}
            temporary: false
    clients:
      - clientId: gitlab
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        secret: ${GITLAB_CLIENT_SECRET}
        redirectUris:
          - https://gitlab.{{ $clusterDomain }}/users/auth/openid_connect/callback
        webOrigins:
          - https://gitlab.{{ $clusterDomain }}
        defaultClientScopes:
          - openid
          - profile
          - email
        attributes:
          pkce.code.challenge.method: S256
        protocolMappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              claim.name: groups
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
      - clientId: idp-4-ocp
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        secret: ${OCP_CLIENT_SECRET}
        redirectUris:
          - https://oauth-openshift.{{ $clusterDomain }}/*
        webOrigins:
          - https://oauth-openshift.{{ $clusterDomain }}
        defaultClientScopes:
          - openid
          - profile
          - email
        attributes: {}
        protocolMappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              claim.name: groups
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
    groups:
      - name: admins
      {{- if and .Values.github.broker .Values.github.mapper .Values.github.org }}
      - name: org-members
      {{- end }}
    {{- if or .Values.gitlab.broker .Values.github.broker }}
    identityProviders:
      {{- if .Values.gitlab.broker }}
      - alias: gitlab
        providerId: oidc
        enabled: true
        trustEmail: true
        firstBrokerLoginFlowAlias: first broker login
        config:
          clientId: ${GITLAB_BROKER_CLIENT_ID}
          clientSecret: ${GITLAB_BROKER_CLIENT_SECRET}
          authorizationUrl: https://gitlab.{{ $clusterDomain }}/oauth/authorize
          tokenUrl: https://gitlab.{{ $clusterDomain }}/oauth/token
          userInfoUrl: https://gitlab.{{ $clusterDomain }}/oauth/userinfo
          issuer: https://gitlab.{{ $clusterDomain }}
          defaultScope: openid profile email
          syncMode: FORCE
          pkceEnabled: "true"
          pkceMethod: S256
      {{- end }}
      {{- if .Values.github.broker }}
      - alias: github
        providerId: github
        enabled: true
        trustEmail: true
        storeToken: true
        firstBrokerLoginFlowAlias: first broker login
        {{- if and .Values.github.mapper .Values.github.org }}
        postBrokerLoginFlowAlias: github-org-check
        {{- end }}
        config:
          clientId: ${GITHUB_CLIENT_ID}
          clientSecret: ${GITHUB_CLIENT_SECRET}
          defaultScope: "user:email{{ if .Values.github.mapper }} read:org{{ end }}"
          syncMode: FORCE
      {{- end }}
    identityProviderMappers:
      {{- if .Values.gitlab.broker }}
      - name: gitlab-username
        identityProviderAlias: gitlab
        identityProviderMapper: oidc-username-idp-mapper
        config:
          syncMode: INHERIT
          template: "${ALIAS}.${CLAIM.preferred_username}"
      {{- end }}
      {{- if .Values.github.broker }}
      - name: github-username
        identityProviderAlias: github
        identityProviderMapper: oidc-username-idp-mapper
        config:
          syncMode: INHERIT
          template: "${ALIAS}.${CLAIM.login}"
      {{- if and .Values.github.mapper .Values.github.org }}
      - name: github-org-admins
        identityProviderAlias: github
        identityProviderMapper: github-org-to-group-mapper
        config:
          syncMode: FORCE
          github.org: {{ .Values.github.org }}
          {{- if .Values.github.team }}
          github.team: {{ .Values.github.team }}
          {{- end }}
          keycloak.group: admins
      - name: github-org-members
        identityProviderAlias: github
        identityProviderMapper: github-org-to-group-mapper
        config:
          syncMode: FORCE
          github.org: {{ .Values.github.org }}
          keycloak.group: org-members
      {{- end }}
      {{- end }}
    {{- end }}
    {{- if and .Values.github.broker .Values.github.mapper .Values.github.org }}
    authenticationFlows:
      - alias: github-org-check
        description: "Deny users not in the GitHub org"
        providerId: basic-flow
        topLevel: true
        builtIn: false
        authenticationExecutions:
          - authenticatorFlow: true
            flowAlias: "Deny non-org members"
            requirement: CONDITIONAL
            priority: 0
      - alias: "Deny non-org members"
        description: "Conditional deny for non-org members"
        providerId: basic-flow
        topLevel: false
        builtIn: false
        authenticationExecutions:
          - authenticator: conditional-user-role
            authenticatorFlow: false
            requirement: REQUIRED
            priority: 0
            authenticatorConfig:
              alias: "Not in org-members"
              config:
                condUserRole: "org-members"
                negate: "true"
          - authenticator: deny-access-authenticator
            authenticatorFlow: false
            requirement: REQUIRED
            priority: 1
            authenticatorConfig:
              alias: "Org access denied"
              config:
                errorMessage: "Access denied. You must be a member of the {{ .Values.github.org }} GitHub organization."
    {{- end }}
