{{- $existingSecret := lookup "v1" "Secret" .Values.namespace "keycloak-db-secret" }}
{{- $password := randAlphaNum 24 }}
{{- if and $existingSecret $existingSecret.data (index $existingSecret.data "password") }}
{{- $password = index $existingSecret.data "password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  username: keycloak
  password: {{ $password }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgresql
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgresql
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: keycloak-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-postgresql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak-postgresql
    spec:
      containers:
      - name: postgresql
        image: registry.redhat.io/rhel9/postgresql-16:latest
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: username
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: password
        - name: POSTGRESQL_DATABASE
          value: keycloak
        volumeMounts:
        - name: data
          mountPath: /var/lib/pgsql/data
        readinessProbe:
          exec:
            command:
            - /usr/libexec/check-container
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - /usr/libexec/check-container
            - --live
          initialDelaySeconds: 120
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: keycloak-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgresql
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: keycloak-postgresql
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: keycloak-postgresql
