{{- $existing := lookup "v1" "Secret" .Values.namespace "keycloak-gitlab-client-secret" }}
{{- $clientSecret := "" }}
{{- if and $existing $existing.data (index $existing.data "client-secret") }}
{{- $clientSecret = index $existing.data "client-secret" | b64dec }}
{{- else }}
{{- $clientSecret = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-gitlab-client-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  client-secret: {{ $clientSecret }}
---
{{- $existingOcp := lookup "v1" "Secret" .Values.namespace "keycloak-ocp-client-secret" }}
{{- $ocpClientSecret := "" }}
{{- if and $existingOcp $existingOcp.data (index $existingOcp.data "client-secret") }}
{{- $ocpClientSecret = index $existingOcp.data "client-secret" | b64dec }}
{{- else }}
{{- $ocpClientSecret = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-ocp-client-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  client-secret: {{ $ocpClientSecret }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-sysadmin-password
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-sysadmin-password
  data:
  - secretKey: password
    remoteRef:
      key: keycloak
      property: sysadmin-password
