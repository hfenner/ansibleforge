apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-terminal
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/hfenner/ansibleforge.git
    targetRevision: main
    path: ocp/gitops/web-terminal
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
