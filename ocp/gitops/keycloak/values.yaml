clusterDomain: ""
clusterName: ""
namespace: keycloak

# GitLab as identity broker in Keycloak SSO realm
gitlab:
  broker: false

# GitHub as identity broker in Keycloak SSO realm
github:
  broker: false
  # Deploy custom GitHub org-to-group mapper SPI
  mapper: false
  # GitHub organization for admin group mapping (requires mapper: true)
  org: ""
  # GitHub team slug for admin group mapping (optional, narrows org to team)
  team: ""

# AWS SAML federation (admins-only AWS Console access)
aws:
  saml: false
  accountId: ""
