{{- range $name, $app := .Values.components }}
{{- if $app.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $app.name | default $name }}
  namespace: openshift-gitops
  {{- if $app.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.syncWave | quote }}
  {{- end }}
spec:
  project: default
  {{- if $app.sources }}
  sources:
    {{- range $app.sources }}
    - repoURL: {{ .repoURL | default $.Values.repoURL }}
      targetRevision: {{ .targetRevision | default $.Values.targetRevision }}
      {{- with .path }}
      path: {{ . }}
      {{- end }}
      {{- with .chart }}
      chart: {{ . }}
      {{- end }}
      {{- with .ref }}
      ref: {{ . }}
      {{- end }}
      {{- with .helm }}
      helm:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- else }}
  source:
    repoURL: {{ $.Values.repoURL }}
    targetRevision: {{ $.Values.targetRevision }}
    path: {{ $app.path }}
    {{- if or $app.helm $.Values.clusterDomain }}
    helm:
      {{- with $app.helm }}
      {{- if .valueFiles }}
      valueFiles:
        {{- toYaml .valueFiles | nindent 8 }}
      {{- end }}
      {{- end }}
      parameters:
        {{- if $.Values.clusterDomain }}
        - name: clusterDomain
          value: {{ $.Values.clusterDomain | quote }}
        {{- end }}
        {{- with $app.helm }}
        {{- range .parameters }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
  destination:
    server: https://kubernetes.default.svc
    {{- with $app.destination }}
    {{- with .namespace }}
    namespace: {{ . }}
    {{- end }}
    {{- end }}
  {{- if $app.ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml $app.ignoreDifferences | nindent 4 }}
  {{- end }}
  syncPolicy:
    {{- if not $app.manualSync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    {{- if $app.retry }}
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 1
        maxDuration: 5m
    {{- end }}
    {{- if $app.syncOptions }}
    syncOptions:
      {{- toYaml $app.syncOptions | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
