---
- name: Create openshift-gitops-operator namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: openshift-gitops-operator

- name: Create OperatorGroup for OpenShift GitOps
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: openshift-gitops
        namespace: openshift-gitops-operator
      spec:
        upgradeStrategy: Default

- name: Subscribe to OpenShift GitOps operator
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: openshift-gitops-operator
        namespace: openshift-gitops-operator
      spec:
        channel: latest
        name: openshift-gitops-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace
        installPlanApproval: Automatic

- name: Wait for pods in openshift-gitops-operator to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: openshift-gitops-operator
  register: r_pods
  until:
    - r_pods.resources | length > 0
    - r_pods.resources
      | rejectattr('status.phase', 'in', ['Succeeded', 'Failed'])
      | map(attribute='status.conditions')
      | map('selectattr', 'type', 'equalto', 'Ready')
      | map('selectattr', 'status', 'equalto', 'True')
      | map('list') | map('length') | sum
      == r_pods.resources
      | rejectattr('status.phase', 'in', ['Succeeded', 'Failed'])
      | list | length
  retries: "{{ ocp4_workload_ansibleforge_bootstrap_operator_retries }}"
  delay: "{{ ocp4_workload_ansibleforge_bootstrap_operator_delay }}"

- name: Wait for pods in openshift-gitops to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: openshift-gitops
  register: r_pods
  until:
    - r_pods.resources | length > 0
    - r_pods.resources
      | rejectattr('status.phase', 'in', ['Succeeded', 'Failed'])
      | map(attribute='status.conditions')
      | map('selectattr', 'type', 'equalto', 'Ready')
      | map('selectattr', 'status', 'equalto', 'True')
      | map('list') | map('length') | sum
      == r_pods.resources
      | rejectattr('status.phase', 'in', ['Succeeded', 'Failed'])
      | list | length
  retries: "{{ ocp4_workload_ansibleforge_bootstrap_operator_retries }}"
  delay: "{{ ocp4_workload_ansibleforge_bootstrap_operator_delay }}"

- name: Grant cluster-admin to ArgoCD application controller
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: openshift-gitops-controller-cluster-admin
      subjects:
        - kind: ServiceAccount
          name: openshift-gitops-argocd-application-controller
          namespace: openshift-gitops
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin

- name: Create ArgoCD instance
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: argoproj.io/v1beta1
      kind: ArgoCD
      metadata:
        name: openshift-gitops
        namespace: openshift-gitops
      spec:
        resourceHealthChecks:
          - group: ""
            kind: PersistentVolumeClaim
            check: |
              hs = {}
              if obj.status == nil or obj.status.phase == nil then
                hs.status = "Healthy"
                hs.message = "Waiting for first consumer"
              elseif obj.status.phase == "Pending" then
                hs.status = "Healthy"
                hs.message = "Waiting for first consumer"
              elseif obj.status.phase == "Bound" then
                hs.status = "Healthy"
              else
                hs.status = "Degraded"
                hs.message = "PVC is in " .. obj.status.phase .. " phase"
              end
              return hs
        server:
          route:
            enabled: true
        resourceTrackingMethod: annotation

- name: Configure ArgoCD knownTypeFields for OpenShift types
  kubernetes.core.k8s:
    state: patched
    kind: ConfigMap
    name: argocd-cm
    namespace: openshift-gitops
    definition:
      data:
        resource.customizations.knownTypeFields.build.openshift.io_BuildConfig: |
          [{"field": "spec", "type": "build.openshift.io/v1/BuildConfigSpec"}]
        resource.customizations.knownTypeFields.image.openshift.io_ImageStream: |
          [{"field": "spec", "type": "image.openshift.io/v1/ImageStreamSpec"}]

- name: Create cluster-bootstrap Application
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'bootstrap-application.yaml.j2') | from_yaml }}"

- name: Wait for bootstrap Application to be Healthy
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ ocp4_workload_ansibleforge_bootstrap_application_name }}"
    namespace: "{{ ocp4_workload_ansibleforge_bootstrap_namespace }}"
  register: r_app
  until:
    - r_app.resources | length > 0
    - r_app.resources[0].status.health.status == "Healthy"
  retries: "{{ ocp4_workload_ansibleforge_bootstrap_health_retries }}"
  delay: "{{ ocp4_workload_ansibleforge_bootstrap_health_delay }}"

- name: Get ArgoCD route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: openshift-gitops-server
    namespace: openshift-gitops
  register: r_route

- name: Report ArgoCD URL to agnosticd
  when: r_route.resources | length > 0
  agnosticd_user_info:
    data:
      argocd_url: "https://{{ r_route.resources[0].spec.host }}"
