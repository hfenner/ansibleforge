repoURL: https://github.com/hfenner/ansibleforge.git
targetRevision: main
clusterDomain: ""
clusterName: ""

components:

  gitops-config:
    enabled: true
    syncWave: "0"
    path: ocp/gitops/gitops-config
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: argoproj.io
        kind: ArgoCD
        name: openshift-gitops
        managedFieldsManagers:
          - manager

  vault:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/vault
    destination:
      namespace: vault
    retry: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: vault-agent-injector-cfg
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle

  external-secrets:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/external-secrets
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  pipelines:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/pipelines
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  keycloak:
    enabled: false
    syncWave: "1"
    path: ocp/gitops/keycloak
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  gitlab:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/gitlab
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  aap:
    enabled: true
    syncWave: "1"
    name: aap-consolelink
    path: ocp/gitops/aap
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  noobaa-tuning:
    enabled: false
    syncWave: "1"
    path: ocp/gitops/noobaa-tuning
    destination:
      namespace: openshift-storage
    manualSync: true
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: noobaa.io
        kind: NooBaa
        name: noobaa
        jsonPointers:
          - /spec/coreResources
          - /spec/dbResources
          - /spec/endpoints

  local-users:
    enabled: false
    syncWave: "2"
    path: ocp/gitops/local-users
    syncOptions:
      - ServerSideApply=true

  user-projects:
    enabled: false
    syncWave: "2"
    path: ocp/gitops/user-projects
    syncOptions:
      - ServerSideApply=true

  shared-builds:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/shared-builds
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  cluster-auth:
    enabled: false
    syncWave: "2"
    path: ocp/gitops/auth
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  devspaces:
    enabled: true
    path: ocp/gitops/devspaces
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true

  web-terminal:
    enabled: true
    path: ocp/gitops/web-terminal
    syncOptions:
      - ServerSideApply=true
