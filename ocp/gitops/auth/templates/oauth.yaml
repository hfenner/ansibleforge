{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  identityProviders:
{{- if .Values.htpasswd.enabled }}
    - name: Local
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: htpasswd-secret
{{- end }}
{{- if .Values.keycloak.login }}
    - name: rhbk
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: idp-4-ocp
        clientSecret:
          name: keycloak-oidc-secret
        issuer: https://keycloak.{{ $clusterDomain }}/realms/sso
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
          groups:
            - groups
{{- end }}
{{- if .Values.gitlab.login }}
{{- $glSecret := lookup "v1" "Secret" "gitlab-system" "gitlab-openshift-oauth" }}
{{- if and $glSecret $glSecret.data }}
{{- $gitlabHost := .Values.gitlab.host }}
{{- if not $gitlabHost }}
{{- $dns := lookup "config.openshift.io/v1" "DNS" "" "cluster" }}
{{- if $dns }}
{{- $gitlabHost = printf "gitlab.apps.%s" $dns.spec.baseDomain }}
{{- end }}
{{- end }}
    - name: gitlab
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: {{ index $glSecret.data "id" | b64dec }}
        clientSecret:
          name: gitlab-oidc-secret
        issuer: https://{{ $gitlabHost }}
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
{{- end }}
{{- end }}
