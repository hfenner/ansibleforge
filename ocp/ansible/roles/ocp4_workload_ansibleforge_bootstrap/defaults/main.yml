---
# Git repository containing the ArgoCD app-of-apps bootstrap manifests
ocp4_workload_ansibleforge_bootstrap_repo_url: "https://github.com/hfenner/ansibleforge.git"
ocp4_workload_ansibleforge_bootstrap_repo_revision: "main"
ocp4_workload_ansibleforge_bootstrap_repo_path: "ocp/gitops/bootstrap"

# ArgoCD namespace and bootstrap Application name
ocp4_workload_ansibleforge_bootstrap_namespace: "openshift-gitops"
ocp4_workload_ansibleforge_bootstrap_application_name: "cluster-bootstrap"

# How long to wait for the GitOps operator pods to become ready
ocp4_workload_ansibleforge_bootstrap_operator_retries: 60
ocp4_workload_ansibleforge_bootstrap_operator_delay: 10

# How long to wait for the bootstrap Application to become Healthy
ocp4_workload_ansibleforge_bootstrap_health_retries: 60
ocp4_workload_ansibleforge_bootstrap_health_delay: 15
