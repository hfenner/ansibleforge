---
schemaVersion: 2.2.0
metadata:
  name: product-demos
variables:
  git_path: https://github.com/hfenner
  builds_namespace: shared-builds
attributes:
  pod-overrides:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "devspaces-user"
        vault.hashicorp.com/agent-inject-secret-ansible: "secret/data/ansible"
        vault.hashicorp.com/agent-inject-secret-quay: "secret/data/quay"
components:
  - name: development-container
    container:
      image: image-registry.openshift-image-registry.svc:5000/{{builds_namespace}}/ansible-devspaces:latest
      memoryRequest: 256M
      memoryLimit: 5Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      args: ['tail', '-f', '/dev/null']
      envFrom:
        - configMapRef:
            name: workspace-env
  - name: ee-dragonslair
    container:
      image: image-registry.openshift-image-registry.svc:5000/{{builds_namespace}}/ee-dragonslair:latest
      memoryRequest: 256M
      memoryLimit: 5Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      args: ['tail', '-f', '/dev/null']
      envFrom:
        - configMapRef:
            name: workspace-env
projects:
  - name: product-demos
    git:
      remotes:
        origin: "{{ git_path }}/product-demos.git"
      checkoutFrom:
        revision: main
    clonePath: product-demos
