site_name: AnsibleForge
site_description: A GitOps-driven Ansible development environment on OpenShift — batteries included.
site_url: https://hfenner.github.io/ansibleforge/
repo_url: https://github.com/hfenner/ansibleforge
repo_name: hfenner/ansibleforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Containers:
    - containers/index.md
    - ansible-devspaces: containers/ansible-devspaces.md
    - ee-dragonslair: containers/ee-dragonslair.md
  - Infrastructure:
    - infrastructure/index.md
    - HashiCorp Vault: infrastructure/vault.md
    - External Secrets: infrastructure/external-secrets.md
    - Shared Builds: infrastructure/shared-builds.md
    - DevSpaces: infrastructure/devspaces.md
    - User Provisioning: infrastructure/user-provisioning.md
    - OpenShift Pipelines: infrastructure/pipelines.md
    - GitLab: infrastructure/gitlab.md
    - Keycloak: infrastructure/keycloak.md
    - AAP: infrastructure/aap.md
    - RHDP Integration: infrastructure/rhdp.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
