{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- $clusterDomain := "" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-wildcard
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: ingress-wildcard-tls
  commonName: "*.{{ $clusterDomain }}"
  dnsNames:
    - "*.{{ $clusterDomain }}"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: prod-letsencrypt-cluster-issuer
