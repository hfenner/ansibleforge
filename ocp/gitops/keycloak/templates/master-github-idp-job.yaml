{{- if and .Values.github.broker .Values.github.mapper .Values.github.org }}
{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: master-github-idp
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 180
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: configure-master-idp
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/sh", "-c"]
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.{{ $clusterDomain }}"
            - name: GITHUB_ORG
              value: {{ .Values.github.org | quote }}
            {{- if .Values.github.team }}
            - name: GITHUB_TEAM
              value: {{ .Values.github.team | quote }}
            {{- end }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-app-credentials
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-app-credentials
                  key: client-secret
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: username
            - name: KC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
          args:
            - |
              set -e

              echo "=== Obtaining admin token ==="
              TOKEN=$(curl -sf -k "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=${KC_ADMIN_USER}" \
                -d "password=${KC_ADMIN_PASS}" \
                -d "grant_type=password" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
              AUTH="Authorization: Bearer ${TOKEN}"

              echo "=== Configuring GitHub IdP on master realm ==="
              EXISTING=$(curl -sf -k -o /dev/null -w "%{http_code}" \
                -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances/github")

              if [ "$EXISTING" = "200" ]; then
                echo "GitHub IdP already exists, updating..."
                curl -sf -k -X PUT \
                  "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances/github" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d "{
                    \"alias\": \"github\",
                    \"providerId\": \"github\",
                    \"enabled\": true,
                    \"trustEmail\": true,
                    \"storeToken\": true,
                    \"firstBrokerLoginFlowAlias\": \"first broker login\",
                    \"config\": {
                      \"clientId\": \"${GITHUB_CLIENT_ID}\",
                      \"clientSecret\": \"${GITHUB_CLIENT_SECRET}\",
                      \"defaultScope\": \"user:email read:org\",
                      \"syncMode\": \"FORCE\"
                    }
                  }"
              else
                echo "Creating GitHub IdP..."
                curl -sf -k -X POST \
                  "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d "{
                    \"alias\": \"github\",
                    \"providerId\": \"github\",
                    \"enabled\": true,
                    \"trustEmail\": true,
                    \"storeToken\": true,
                    \"firstBrokerLoginFlowAlias\": \"first broker login\",
                    \"config\": {
                      \"clientId\": \"${GITHUB_CLIENT_ID}\",
                      \"clientSecret\": \"${GITHUB_CLIENT_SECRET}\",
                      \"defaultScope\": \"user:email read:org\",
                      \"syncMode\": \"FORCE\"
                    }
                  }"
              fi

              echo "=== Configuring IdP mappers ==="
              # Get existing mappers
              MAPPERS=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances/github/mappers")

              upsert_mapper() {
                local name="$1" payload="$2"
                local existing_id
                existing_id=$(echo "${MAPPERS}" | python3 -c "
              import sys,json
              mappers=json.load(sys.stdin)
              matches=[m['id'] for m in mappers if m['name']=='${name}']
              print(matches[0] if matches else '')
              " 2>/dev/null)

                if [ -n "$existing_id" ]; then
                  echo "Updating mapper: ${name}"
                  curl -sf -k -X PUT \
                    "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances/github/mappers/${existing_id}" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "$(echo "${payload}" | python3 -c "import sys,json; d=json.load(sys.stdin); d['id']='${existing_id}'; print(json.dumps(d))")"
                else
                  echo "Creating mapper: ${name}"
                  curl -sf -k -X POST \
                    "${KEYCLOAK_URL}/admin/realms/master/identity-provider/instances/github/mappers" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "${payload}"
                fi
              }

              upsert_mapper "github-username" '{
                "name": "github-username",
                "identityProviderAlias": "github",
                "identityProviderMapper": "oidc-username-idp-mapper",
                "config": {
                  "syncMode": "INHERIT",
                  "template": "${ALIAS}.${CLAIM.login}"
                }
              }'

              TEAM_CONFIG=""
              if [ -n "${GITHUB_TEAM:-}" ]; then
                TEAM_CONFIG="\"github.team\": \"${GITHUB_TEAM}\","
              fi
              upsert_mapper "github-org-admins" "{
                \"name\": \"github-org-admins\",
                \"identityProviderAlias\": \"github\",
                \"identityProviderMapper\": \"github-org-to-group-mapper\",
                \"config\": {
                  \"syncMode\": \"FORCE\",
                  \"github.org\": \"${GITHUB_ORG}\",
                  ${TEAM_CONFIG}
                  \"keycloak.group\": \"admins\"
                }
              }"

              echo "=== Configuring admins group with admin role ==="
              # Create admins group if it doesn't exist
              GROUP_ID=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/groups?search=admins" \
                | python3 -c "
              import sys,json
              groups=json.load(sys.stdin)
              matches=[g['id'] for g in groups if g['name']=='admins']
              print(matches[0] if matches else '')
              ")

              if [ -z "$GROUP_ID" ]; then
                echo "Creating admins group..."
                curl -sf -k -X POST \
                  "${KEYCLOAK_URL}/admin/realms/master/groups" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d '{"name": "admins"}'
                GROUP_ID=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/master/groups?search=admins" \
                  | python3 -c "import sys,json; groups=json.load(sys.stdin); print(next(g['id'] for g in groups if g['name']=='admins'))")
              else
                echo "admins group already exists"
              fi

              # Assign admin realm role to admins group
              ADMIN_ROLE=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/roles/admin")
              echo "Assigning admin role to admins group..."
              curl -sf -k -X POST \
                "${KEYCLOAK_URL}/admin/realms/master/groups/${GROUP_ID}/role-mappings/realm" \
                -H "${AUTH}" -H "Content-Type: application/json" \
                -d "[${ADMIN_ROLE}]" || echo "(role may already be assigned)"

              echo "=== Master realm GitHub IdP configuration complete ==="
{{- end }}
