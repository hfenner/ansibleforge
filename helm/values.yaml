repoURL: "https://github.com/hfenner/ansibleforge.git"
targetRevision: "main"
bootstrapPath: "ocp/gitops/bootstrap"

argocd:
  namespace: openshift-gitops
  project: default
  destination:
    server: https://kubernetes.default.svc

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - ServerSideApply=true

# Additional values files to overlay on the bootstrap chart
# e.g., ["values-aws.yaml"] to enable AWS-specific components
valueFiles: []

# Cluster-specific AWS values (passed through to bootstrap chart as helm parameters)
aws:
  efs:
    filesystemId: ""
  ingressCerts:
    acmeEmail: ""
    route53Region: ""
    route53HostedZoneID: ""
