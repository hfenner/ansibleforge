namespace: vault

vault:
  global:
    openshift: true
    namespace: vault
  injector:
    image:
      repository: registry.connect.redhat.com/hashicorp/vault-k8s
      tag: 1.7.2-ubi
    agentImage:
      repository: registry.connect.redhat.com/hashicorp/vault
      tag: 1.21.2-ubi
  server:
    image:
      repository: registry.connect.redhat.com/hashicorp/vault
      tag: 1.21.2-ubi
    standalone:
      enabled: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "file" {
          path = "/vault/data"
        }
    route:
      enabled: true
      host: vault.apps.cluster-mp7gr.dynamic.redhatworkshops.io
    dataStorage:
      enabled: true
      size: 10Gi
  ui:
    enabled: true
