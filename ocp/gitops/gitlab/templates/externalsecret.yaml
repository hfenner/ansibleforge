{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
{{- if .Values.clusterName }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-keycloak-oidc
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-keycloak-oidc
    template:
      engineVersion: v2
      data:
        provider: |
          name: openid_connect
          label: Keycloak
          args:
            name: openid_connect
            scope:
              - openid
              - profile
              - email
              - groups
            response_type: code
            issuer: https://keycloak.{{ $clusterDomain }}/realms/sso
            discovery: true
            pkce: true
            client_auth_method: basic
            client_options:
              identifier: gitlab
              secret: {{ "{{ .clientSecret }}" }}
              redirect_uri: https://gitlab.{{ $clusterDomain }}/users/auth/openid_connect/callback
              gitlab:
                groups_attribute: groups
                admin_groups:
                  - admins
  data:
  - secretKey: clientSecret
    remoteRef:
      key: {{ .Values.clusterName }}/keycloak
      property: gitlab-client-secret
{{- else }}
{{- $kcSecret := lookup "v1" "Secret" "keycloak" "keycloak-gitlab-client-secret" }}
{{- $clientSecret := "WAITING_FOR_KEYCLOAK_SECRET" }}
{{- if and $kcSecret $kcSecret.data (index $kcSecret.data "client-secret") }}
{{- $clientSecret = index $kcSecret.data "client-secret" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-keycloak-oidc
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  provider: |
    name: openid_connect
    label: Keycloak
    args:
      name: openid_connect
      scope:
        - openid
        - profile
        - email
        - groups
      response_type: code
      issuer: https://keycloak.{{ $clusterDomain }}/realms/sso
      discovery: true
      pkce: true
      client_auth_method: basic
      client_options:
        identifier: gitlab
        secret: {{ $clientSecret }}
        redirect_uri: https://gitlab.{{ $clusterDomain }}/users/auth/openid_connect/callback
        gitlab:
          groups_attribute: groups
          admin_groups:
            - admins
{{- end }}
